<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .meme {
    position: relative; width: 840px; height: 840px;
    border-radius: 18px; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .meme img { display: block; width: 100%; height: 100%; }
  .cell {
    position: absolute; left: 50%; width: 50%; height: 50%;
    display: flex; align-items: center; justify-content: center;
    padding: 26px;
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 46px; line-height: 1.18; text-align: center;
    text-transform: uppercase; color: #000;
  }
  .cell.top { top: 0; }
  .cell.bottom { top: 50%; }
</style>
</head>
<body>
  <div class="meme">
    <img src="drake-template.png" alt="Drake meme">
    <div class="cell top">$10/мес за чужой сервис</div>
    <div class="cell bottom">$100/мес за Claude Max</div>
  </div>
</body>
</html>
